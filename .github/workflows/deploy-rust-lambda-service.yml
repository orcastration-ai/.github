name: Deploy Rust Lambda Service

on:
  workflow_call:
    inputs:
      service-id:
        description: "Service identifier used in function name, state key, and SSM paths"
        required: true
        type: string

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  DEV_ACCOUNT_ID: "688365519974"
  DEV_ROLE_ARN: "arn:aws:iam::688365519974:role/github-actions"
  PROD_ACCOUNT_ID: "654158184354"
  PROD_ROLE_ARN: "arn:aws:iam::654158184354:role/github-actions"

jobs:
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Git for Private Repos
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-lambda
        run: pip3 install cargo-lambda

      - name: Build Lambda
        run: cargo lambda build --release --arm64 -p lambda

      - name: Create Lambda Zip
        run: cd target/lambda/bootstrap && zip -j lambda.zip bootstrap

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform State Bucket
        run: |
          BUCKET="orcastration-${{ inputs.service-id }}-tfstate-${{ env.DEV_ACCOUNT_ID }}"
          aws s3 mb "s3://$BUCKET" --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption --bucket "$BUCKET" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"aws:kms"}}]}'

      - name: Configure Git for private modules
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=orcastration-${{ inputs.service-id }}-tfstate-${{ env.DEV_ACCOUNT_ID }}" -backend-config="key=dev/terraform.tfstate"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file="environments/dev.tfvars" -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name "orca-dev-${{ inputs.service-id }}" \
            --zip-file "fileb://target/lambda/bootstrap/lambda.zip" \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Update
        run: |
          aws lambda wait function-updated \
            --function-name "orca-dev-${{ inputs.service-id }}" \
            --region ${{ env.AWS_REGION }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Git for Private Repos
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-lambda
        run: pip3 install cargo-lambda

      - name: Build Lambda
        run: cargo lambda build --release --arm64 -p lambda

      - name: Create Lambda Zip
        run: cd target/lambda/bootstrap && zip -j lambda.zip bootstrap

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform State Bucket
        run: |
          BUCKET="orcastration-${{ inputs.service-id }}-tfstate-${{ env.PROD_ACCOUNT_ID }}"
          aws s3 mb "s3://$BUCKET" --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption --bucket "$BUCKET" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"aws:kms"}}]}'

      - name: Configure Git for private modules
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=orcastration-${{ inputs.service-id }}-tfstate-${{ env.PROD_ACCOUNT_ID }}" -backend-config="key=prod/terraform.tfstate"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file="environments/prod.tfvars" -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name "orca-prod-${{ inputs.service-id }}" \
            --zip-file "fileb://target/lambda/bootstrap/lambda.zip" \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Update
        run: |
          aws lambda wait function-updated \
            --function-name "orca-prod-${{ inputs.service-id }}" \
            --region ${{ env.AWS_REGION }}
