name: Primary Rust Lambda Service

on:
  workflow_call:
    inputs:
      service-id:
        description: "Service identifier for Terraform state key (e.g. x402-gateway-service)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  DEV_ACCOUNT_ID: "688365519974"
  DEV_ROLE_ARN: "arn:aws:iam::688365519974:role/github-actions"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Configure Git for Private Repos
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format Check
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Install cargo-lambda
        run: pip3 install cargo-lambda

      - name: Build Lambda
        run: cargo lambda build --release --arm64 -p lambda

  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    if: ${{ inputs.service-id != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure Git for private modules
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=orcastration-${{ inputs.service-id }}-tfstate-${{ env.DEV_ACCOUNT_ID }}" -backend-config="key=dev/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file="environments/dev.tfvars" -input=false
