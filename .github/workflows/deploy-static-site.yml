name: Deploy Static Site

on:
  workflow_call:
    inputs:
      site-id:
        description: "Site identifier used in SSM paths (e.g. orcastration-ai)"
        required: true
        type: string
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "22"
      pnpm-version:
        description: "pnpm version"
        required: false
        type: string
        default: "10.33.0"
      build-command:
        description: "Build command to produce dist/"
        required: false
        type: string
        default: "pnpm build"

env:
  AWS_REGION: us-east-1
  DEV_ROLE_ARN: "arn:aws:iam::688365519974:role/github-actions"
  PROD_ROLE_ARN: "arn:aws:iam::654158184354:role/github-actions"

jobs:
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read SSM Parameters
        id: ssm
        run: |
          echo "bucket=$(aws ssm get-parameter --name '/orca/dev/sites/${{ inputs.site-id }}/bucket-name' --query 'Parameter.Value' --output text)" >> "$GITHUB_OUTPUT"
          echo "distribution=$(aws ssm get-parameter --name '/orca/dev/sites/${{ inputs.site-id }}/cloudfront-distribution-id' --query 'Parameter.Value' --output text)" >> "$GITHUB_OUTPUT"

      - name: Deploy to S3
        run: aws s3 sync dist/ "s3://${{ steps.ssm.outputs.bucket }}" --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.ssm.outputs.distribution }}" --paths "/*"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read SSM Parameters
        id: ssm
        run: |
          echo "bucket=$(aws ssm get-parameter --name '/orca/prod/sites/${{ inputs.site-id }}/bucket-name' --query 'Parameter.Value' --output text)" >> "$GITHUB_OUTPUT"
          echo "distribution=$(aws ssm get-parameter --name '/orca/prod/sites/${{ inputs.site-id }}/cloudfront-distribution-id' --query 'Parameter.Value' --output text)" >> "$GITHUB_OUTPUT"

      - name: Deploy to S3
        run: aws s3 sync dist/ "s3://${{ steps.ssm.outputs.bucket }}" --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.ssm.outputs.distribution }}" --paths "/*"
