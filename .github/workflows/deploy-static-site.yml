name: Deploy Static Site

on:
  workflow_call:
    inputs:
      site-id:
        description: "Site identifier used in state key and SSM paths (e.g. wiki)"
        required: true
        type: string
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "22"
      pnpm-version:
        description: "pnpm version"
        required: false
        type: string
        default: "10.33.0"
      build-command:
        description: "Build command to produce dist/"
        required: false
        type: string
        default: "pnpm build"

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  DEV_ACCOUNT_ID: "688365519974"
  DEV_ROLE_ARN: "arn:aws:iam::688365519974:role/github-actions"
  PROD_ACCOUNT_ID: "654158184354"
  PROD_ROLE_ARN: "arn:aws:iam::654158184354:role/github-actions"

jobs:
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=orcastration-infra-tfstate-${{ env.DEV_ACCOUNT_ID }}" -backend-config="key=sites/${{ inputs.site-id }}/dev/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -var-file="environments/dev.tfvars" -auto-approve

      - name: Get Terraform Outputs
        id: tf
        working-directory: terraform
        run: |
          echo "bucket=$(terraform output -raw bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Deploy to S3
        run: aws s3 sync dist/ "s3://${{ steps.tf.outputs.bucket }}" --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.tf.outputs.distribution }}" --paths "/*"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=orcastration-infra-tfstate-${{ env.PROD_ACCOUNT_ID }}" -backend-config="key=sites/${{ inputs.site-id }}/prod/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -var-file="environments/prod.tfvars" -auto-approve

      - name: Get Terraform Outputs
        id: tf
        working-directory: terraform
        run: |
          echo "bucket=$(terraform output -raw bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Deploy to S3
        run: aws s3 sync dist/ "s3://${{ steps.tf.outputs.bucket }}" --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.tf.outputs.distribution }}" --paths "/*"
