name: Primary Static Site

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "22"
      pnpm-version:
        description: "pnpm version"
        required: false
        type: string
        default: "10.33.0"
      build-command:
        description: "Build command to produce dist/"
        required: false
        type: string
        default: "pnpm build"
      lint-command:
        description: "Lint command"
        required: false
        type: string
        default: "pnpm lint"
      test-command:
        description: "Test command"
        required: false
        type: string
        default: "pnpm test"
      site-id:
        description: "Site identifier (e.g. wiki, orcastration-ai)"
        required: false
        type: string
        default: ""
    secrets:
      ORCA_PACKAGES_READ:
        description: "PAT with read:packages scope for GitHub Packages"
        required: false

permissions:
  id-token: write
  contents: read
  packages: read

env:
  AWS_REGION: us-east-1
  DEV_ACCOUNT_ID: "688365519974"
  DEV_ROLE_ARN: "arn:aws:iam::688365519974:role/github-actions"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          registry-url: https://npm.pkg.github.com
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ORCA_PACKAGES_READ || github.token }}
      - run: ${{ inputs.lint-command }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          registry-url: https://npm.pkg.github.com
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ORCA_PACKAGES_READ || github.token }}
      - run: ${{ inputs.test-command }}

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          registry-url: https://npm.pkg.github.com
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ORCA_PACKAGES_READ || github.token }}
      - run: ${{ inputs.build-command }}

  validate:
    name: Validate Infrastructure
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ inputs.site-id != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure Git for private modules
        run: git config --global url."https://x-access-token:${{ secrets.ORCA_PACKAGES_READ || github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=orcastration-infra-tfstate-${{ env.DEV_ACCOUNT_ID }}" -backend-config="key=sites/${{ inputs.site-id }}/dev/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file="environments/dev.tfvars" -input=false
